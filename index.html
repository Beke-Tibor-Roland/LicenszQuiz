<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Licensz Quiz</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="quiz-panel" aria-live="polite">
        <header class="topbar">
          <div>
            <p class="eyebrow">Licensz felkészülés</p>
            <h1>Quiz gyakorló</h1>
          </div>
          <div class="header-actions">
            <label class="theme-switch" for="themeToggle">
              <input id="themeToggle" type="checkbox">
              <span class="switch-track" aria-hidden="true">
                <span class="switch-thumb"></span>
              </span>
              <span class="theme-switch-text">Éjszakai mód</span>
            </label>
            <button class="ghost-button" id="restartButton" type="button">Új quiz</button>
          </div>
        </header>

        <div class="start-view" id="startView">
          <div class="start-copy">
            <p class="stat-label">Válassz gyakorlást</p>
            <strong id="questionTotal">0</strong>
          </div>
          <div class="mode-actions">
            <button class="primary-button mode-button" id="pdfModeButton" type="button">
              <span>PDF kérdések</span>
              <small id="pdfQuestionCount">0 kérdés</small>
            </button>
            <button class="ghost-button mode-button" id="generatedModeButton" type="button">
              <span>Generált kérdések</span>
              <small id="generatedQuestionCount">0 kérdés</small>
            </button>
          </div>
        </div>

        <div class="quiz-view hidden" id="quizView">
          <div class="status-row">
            <span id="counter">1 / 120</span>
            <span id="score">Pontszám: 0</span>
          </div>

          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>

          <article class="question-card">
            <div class="question-meta">
              <span id="tetelLabel">1. tétel</span>
              <span id="pageLabel">PDF oldal: 1</span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="answers" id="answers"></div>
          </article>

          <div class="feedback hidden" id="feedback"></div>

          <div class="actions">
            <button class="primary-button hidden" id="nextButton" type="button">Következő</button>
          </div>
        </div>

        <div class="result-view hidden" id="resultView">
          <p class="eyebrow">Eredmény</p>
          <h2 id="resultTitle"></h2>
          <p id="resultDetails"></p>
          <button class="primary-button" id="againButton" type="button">Újra próbálom</button>
        </div>
      </section>
    </main>

    <script src="questions.js"></script>
    <script src="generated_questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
